# GPU-оверлей для Ollama (NVIDIA).
# Використання:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
#
# Передумови:
#   - NVIDIA GPU + актуальний драйвер;
#   - NVIDIA Container Toolkit (Linux) або Docker Desktop із WSL2 + GPU (Windows).
# Перевірка доступу до GPU з контейнера:
#   docker compose exec ollama nvidia-smi

services:
  ollama:
    environment:
      # Flash Attention + квантований KV-кеш — менше VRAM під контекст,
      # що дає змогу тримати більшу модель на 6 ГБ (див. підрозділ 3.3).
      OLLAMA_FLASH_ATTENTION: "1"
      OLLAMA_KV_CACHE_TYPE: "q8_0"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
