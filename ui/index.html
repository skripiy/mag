<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CRM-hotline-AI</title>
<style>
  :root { --bg:#0f172a; --card:#1e293b; --fg:#e2e8f0; --muted:#94a3b8;
          --accent:#38bdf8; --border:#334155; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:system-ui,Segoe UI,Roboto,sans-serif;
         background:var(--bg); color:var(--fg); line-height:1.5; }
  .wrap { max-width:760px; margin:0 auto; padding:2rem 1rem 4rem; }
  h1 { font-size:1.4rem; margin:0 0 .25rem; }
  p.sub { color:var(--muted); margin:0 0 1.5rem; font-size:.9rem; }
  textarea { width:100%; min-height:96px; padding:.75rem; border-radius:8px;
             border:1px solid var(--border); background:var(--card); color:var(--fg);
             font-size:1rem; resize:vertical; }
  button { margin-top:.75rem; padding:.6rem 1.2rem; border:0; border-radius:8px;
           background:var(--accent); color:#04263a; font-weight:600; cursor:pointer;
           font-size:1rem; }
  button:disabled { opacity:.6; cursor:progress; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:10px;
          padding:1rem 1.15rem; margin-top:1.5rem; }
  .answer { white-space:pre-wrap; }
  .meta { color:var(--muted); font-size:.82rem; margin-top:.5rem; }
  h3 { font-size:.95rem; margin:1.25rem 0 .5rem; color:var(--muted);
       text-transform:uppercase; letter-spacing:.04em; }
  .src { border-left:3px solid var(--accent); padding:.4rem .75rem; margin:.5rem 0;
         background:#0b1220; border-radius:0 6px 6px 0; font-size:.9rem; }
  .src .t { font-weight:600; }
  .score { color:var(--accent); font-variant-numeric:tabular-nums; }
  .err { color:#f87171; }
</style>
</head>
<body>
<div class="wrap">
  <h1>CRM-hotline-AI</h1>
  <p class="sub">Сервісна система обробки запитів на основі RAG з локальною LLM</p>

  <textarea id="q" placeholder="Введіть запитання, напр.: Які терміни доставки по Україні?"></textarea>
  <br>
  <button id="send">Запитати</button>

  <div id="out"></div>
</div>

<script>
const $ = (s) => document.querySelector(s);
const btn = $("#send"), out = $("#out");

// Коли сторінку віддає застосунок (http://localhost:8000/ui/) — відносний
// шлях; коли відкрита як файл/у прев'ю — б'ємо напряму в застосунок.
const API_BASE = location.protocol.startsWith("http") ? "" : "http://localhost:8000";

async function ask() {
  const text = $("#q").value.trim();
  if (!text) return;
  btn.disabled = true; btn.textContent = "Обробка…"; out.innerHTML = "";
  try {
    const r = await fetch(API_BASE + "/ask/sync", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text })
    });
    if (!r.ok) throw new Error("HTTP " + r.status);
    const d = await r.json();
    render(d);
  } catch (e) {
    out.innerHTML = `<div class="card err">Помилка запиту: ${e.message}</div>`;
  } finally {
    btn.disabled = false; btn.textContent = "Запитати";
  }
}

function render(d) {
  const esc = (s) => (s ?? "").replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  let html = `<div class="card"><div class="answer">${esc(d.answer)}</div>` +
             `<div class="meta">Запит #${d.request_id} · статус: ${d.status}` +
             (d.latency_ms != null ? ` · ${d.latency_ms} мс` : "") + `</div></div>`;
  if (d.sources && d.sources.length) {
    html += `<h3>Джерела (${d.sources.length})</h3>`;
    for (const s of d.sources) {
      html += `<div class="src"><span class="t">[${s.rank}] ${esc(s.document_title)}</span> ` +
              `<span class="score">${s.score.toFixed(3)}</span><br>${esc(s.snippet)}</div>`;
    }
  }
  out.innerHTML = html;
}

btn.addEventListener("click", ask);
$("#q").addEventListener("keydown", (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === "Enter") ask();
});
</script>
</body>
</html>
